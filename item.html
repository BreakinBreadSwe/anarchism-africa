<!-- RAIL TOGGLE SCRIPT (minimal — no SPA tab management needed here) -->
<script>
(function () {
  var rail = document.getElementById('rail');
  var toggle = document.getElementById('menu-toggle');
  var backdrop = document.getElementById('rail-backdrop');
  function openRail()  { rail.classList.add('expanded'); document.body.classList.add('rail-open'); }
  function closeRail() { rail.classList.remove('expanded'); document.body.classList.remove('rail-open'); }
  toggle  && toggle.addEventListener('click', function () { rail.classList.contains('expanded') ? closeRail() : openRail(); });
  backdrop && backdrop.addEventListener('click', closeRail);
  document.getElementById('bottombar')?.addEventListener('click', function (e) {
    var b = e.target.closest('[data-bbar]'); if (!b) return;
    if (b.dataset.bbar === 'menu') { rail.classList.contains('expanded') ? closeRail() : openRail(); }
  });
})();
</script>
