<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192"
     role="img" aria-label="ANARCHISM.AFRICA — circle-A over African continent">
  <!-- bg tile -->
  <rect width="192" height="192" rx="36" fill="#000"/>

  <!-- African continent outline (white, no fill) -->
  <path
    d="M 78 28
       Q 100 22 124 28
       Q 146 36 156 54
       Q 162 70 158 84
       Q 154 96 144 104
       Q 142 116 138 130
       Q 134 144 126 154
       Q 116 162 106 158
       Q 98 150 92 138
       Q 84 122 76 108
       Q 66 92 58 78
       Q 52 64 56 50
       Q 64 34 78 28 Z"
    fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>

  <!-- Madagascar (small detail keeps the silhouette legible as Africa) -->
  <ellipse cx="160" cy="118" rx="4.5" ry="11" fill="none" stroke="#fff" stroke-width="2"/>

  <!-- Anarchist "A" — legs, drawn inside the continent -->
  <path
    d="M 82 144 L 102 60 L 122 144"
    fill="none" stroke="#fff" stroke-width="6"
    stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- Cross-bar — extends past the continent on both sides (the anarchist signature) -->
  <line x1="56" y1="118" x2="148" y2="118"
        stroke="#fff" stroke-width="6" stroke-linecap="square"/>
</svg>
