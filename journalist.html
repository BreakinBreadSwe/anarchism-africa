  <button class="rail-item active" data-view="articlelab"><span class="glyph"><svg viewBox="0 0 24 24"><path d="M5 4h12a3 3 0 010 6H8a2 2 0 00-2 2v6a2 2 0 002 2h12"/><path d="M11 14h6M11 17h4" stroke="currentColor" stroke-width="2" fill="none"/></svg></span><span class="label">Article Lab</span></button>
  <button class="rail-item" title="My drafts" data-view="myarticles"><span class="glyph"><svg viewBox="0 0 24 24"><path d="M5 4h12a3 3 0 010 6H8a2 2 0 00-2 2v6a2 2 0 002 2h12"/></svg></span><span class="label">My drafts</span></button>
  <button class="rail-item" title="Story leads" data-view="leads"><span class="glyph"><svg viewBox="0 0 24 24"><path d="M3 6h18M3 12h18M3 18h12"/></svg></span><span class="label">Story leads</span></button>

    <h2 style="margin:0 0 8px">Journalist · Bureau</h2>

  </div>

</main>

<script>
  RoleShared.boot({
    role: 'journalist',
    views: {
      articlelab: async () => { setTimeout(() => window.ArticleLab?.render(), 0); return '<div id="view-articlelab"></div>'; },
      myarticles: async () => {
        const drafts = JSON.parse(localStorage.getItem('aa.articles.drafts') || '[]');
        if (!drafts.length) return '<div class="panel"><p style="color:var(--muted);margin:0">No drafts yet — open Article Lab to start one.</p></div>';
        return `<div class="panel">
          <h3 style="margin:0 0 10px">My drafts</h3>
          <div style="display:flex;flex-direction:column;gap:8px">
            ${drafts.map(d => `<div class="al-draft-card"><div><b>${d.title || d.topic || '(untitled)'}</b><div class="mono" style="font-size:.7rem;color:var(--muted)">${new Date(d.ts).toLocaleString()}</div></div></div>`).join('')}
          </div>
        </div>`;
      },
      leads:      async () => { setTimeout(() => window.ContentQueue?.render('journalist'), 0); return '<div id="view-content-queue"></div>'; },
      ai:         async () => RoleShared.views.ai(),
      wishlist:   async () => window.AA.wishlist.renderView()
    }
  });
</script>
<script>if ('serviceWorker' in navigator && location.protocol === 'https:') window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));</script>
<script src="js/tooltips.js" defer></script>
<script src="js/pwa-install.js" defer></script>
