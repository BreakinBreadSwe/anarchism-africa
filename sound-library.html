  <meta property="og:title" content="A.A. Sound Library — ANARCHISM.AFRICA" />
  <meta property="og:description" content="Open-source archive — music · radio programs · documentaries · mixes · field recordings." />
  <meta property="og:image" content="/icons/og-image.png" />

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Sound Library page styles ────────────────────────────────────────── */
    #sl-root { padding: 0 0 calc(var(--bottombar-h, 64px) + 24px); }

    /* Hero */
    .sl-hero {
      padding: 28px 20px 24px;
      border-bottom: 1px solid var(--border, #1f1f1f);
      background: linear-gradient(135deg, rgba(220,38,38,.06) 0%, transparent 60%);
    }
    .sl-hero-back {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .72rem; color: var(--muted, #666); text-decoration: none;
      margin-bottom: 16px; letter-spacing: .06em;
    }
    .sl-hero-back:hover { color: var(--fg, #eee); }
    .sl-hero-back svg { width: 14px; height: 14px; }
    .sl-hero-inner { display: flex; gap: 16px; align-items: flex-start; max-width: 860px; }
    .sl-hero-icon {
      width: 52px; height: 52px; border-radius: 14px;
      background: rgba(220,38,38,.15); color: #ef4444;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .sl-hero-icon svg { width: 28px; height: 28px; }
    .sl-hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: .04em; margin: 0 0 4px; line-height: 1; }
    .sl-hero p  { font-size: .82rem; color: var(--muted, #777); margin: 0; max-width: 520px; line-height: 1.5; }
    .sl-hero-meta { font-size: .7rem; color: var(--muted, #666); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }

    /* Controls bar */
    .sl-controls {
      position: sticky; top: var(--topbar-h, 50px); z-index: 20;
      background: rgba(10,10,10,.97); backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border, #1f1f1f);
      padding: 10px 16px; display: flex; flex-direction: column; gap: 8px;
    }
    .sl-search-wrap { position: relative; }
    .sl-search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; color: var(--muted, #666); pointer-events: none; }
    .sl-search {
      width: 100%; height: 36px; padding: 0 32px 0 34px;
      background: var(--card, #111); border: 1px solid var(--border, #222);
      border-radius: 8px; color: var(--fg, #eee); font-size: .82rem;
      outline: none; font-family: inherit;
    }
    .sl-search:focus { border-color: #ef4444; }
    .sl-search-clear {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--muted);
      padding: 2px; display: none;
    }
    .sl-search-clear.visible { display: flex; }
    .sl-search-clear svg { width: 14px; height: 14px; }

    /* Category chips */
    .sl-cats { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
    .sl-cats::-webkit-scrollbar { display: none; }
    .sl-cat-btn {
      flex-shrink: 0; display: flex; align-items: center; gap: 4px;
      padding: 4px 12px; border-radius: 999px; font-size: .72rem; font-weight: 600;
      border: 1px solid var(--border, #222); background: var(--card, #111);
      color: var(--muted, #777); cursor: pointer; letter-spacing: .04em; white-space: nowrap;
      transition: background .15s, color .15s, border-color .15s;
    }
    .sl-cat-btn:hover { border-color: #ef4444; color: var(--fg, #eee); }
    .sl-cat-btn.active { background: #ef4444; color: #fff; border-color: #ef4444; }
    .sl-cat-count { font-size: .65rem; opacity: .7; }

    /* Sort row */
    .sl-sort-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .sl-sort-btns { display: flex; gap: 4px; align-items: center; }
    .sl-sort-btn {
      height: 28px; padding: 0 10px; border-radius: 6px;
      font-size: .72rem; border: 1px solid var(--border, #222);
      background: var(--card, #111); color: var(--muted, #777); cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      transition: background .12s, color .12s;
    }
    .sl-sort-btn:hover, .sl-sort-btn.active { background: #222; color: var(--fg, #eee); }
    .sl-sort-btn.active { border-color: #555; }
    .sl-sort-btn svg { width: 13px; height: 13px; }
    .sl-sort-select {
      height: 28px; padding: 0 8px; border-radius: 6px;
      font-size: .72rem; border: 1px solid var(--border, #222);
      background: var(--card, #111); color: var(--muted, #777); cursor: pointer;
      outline: none; font-family: inherit;
    }
    .sl-count { font-size: .7rem; color: var(--muted, #666); white-space: nowrap; }

    /* Year header */
    .sl-year-hdr {
      display: flex; align-items: center; gap: 12px;
      padding: 24px 16px 10px; max-width: 900px; margin: 0 auto;
    }
    .sl-year-hdr h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: .06em; margin: 0; }
    .sl-year-hdr-line { flex: 1; height: 1px; background: var(--border, #1f1f1f); }
    .sl-year-hdr-count { font-size: .7rem; color: var(--muted, #666); white-space: nowrap; }

    /* Grid */
    .sl-grid {
      display: grid; grid-template-columns: 1fr;
      gap: 10px; padding: 12px 14px; max-width: 900px; margin: 0 auto;
    }
    @media (min-width: 600px) { .sl-grid { grid-template-columns: 1fr 1fr; } }
    @media (min-width: 960px) { .sl-grid { grid-template-columns: 1fr 1fr 1fr; } }

    /* Track card */
    .sl-card {
      border-radius: 12px; border: 1px solid var(--border, #1f1f1f);
      background: var(--card, #0d0d0d); overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }
    .sl-card:hover { border-color: rgba(239,68,68,.3); box-shadow: 0 4px 20px rgba(239,68,68,.08); }
    .sl-card.expanded { border-color: rgba(239,68,68,.5); box-shadow: 0 6px 30px rgba(239,68,68,.12); }

    .sl-card-header {
      display: flex; gap: 10px; padding: 10px; cursor: pointer;
      width: 100%; text-align: left; background: none; border: none; color: inherit;
    }
    .sl-card-thumb {
      width: 64px; height: 64px; border-radius: 8px;
      overflow: hidden; background: var(--border, #1a1a1a); flex-shrink: 0;
      position: relative;
    }
    .sl-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .sl-card-thumb-emoji { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
    .sl-card-thumb-play {
      position: absolute; inset: 0; background: rgba(0,0,0,0);
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .sl-card:hover .sl-card-thumb-play { background: rgba(0,0,0,.45); }
    .sl-card-thumb-play svg { width: 20px; height: 20px; color: #fff; opacity: 0; transition: opacity .15s; }
    .sl-card:hover .sl-card-thumb-play svg { opacity: 1; }

    .sl-card-meta { flex: 1; min-width: 0; text-align: left; }
    .sl-card-title { font-size: .8rem; font-weight: 600; line-height: 1.3; margin: 0 0 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .sl-card-author { font-size: .7rem; color: var(--muted, #666); margin: 0 0 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sl-card-chips { display: flex; flex-wrap: wrap; gap: 4px; align-items: center; }
    .sl-cat-chip {
      font-size: .65rem; font-weight: 700; padding: 2px 6px; border-radius: 999px;
      letter-spacing: .04em; line-height: 1.4;
    }
    .sl-embed-chip { font-size: .65rem; padding: 2px 5px; border-radius: 4px; background: rgba(255,255,255,.07); color: var(--muted, #666); }
    .sl-year-chip { font-size: .65rem; color: var(--muted, #666); display: flex; align-items: center; gap: 2px; }
    .sl-year-chip svg { width: 10px; height: 10px; }

    .sl-card-chevron { flex-shrink: 0; align-self: center; color: var(--muted, #555); }
    .sl-card-chevron svg { width: 14px; height: 14px; }

    /* Expanded panel */
    .sl-card-body { padding: 0 10px 12px; border-top: 1px solid rgba(255,255,255,.06); }
    .sl-embed-tabs { display: flex; gap: 4px; flex-wrap: wrap; padding: 8px 0 6px; }
    .sl-embed-tab {
      font-size: .7rem; padding: 3px 10px; border-radius: 999px;
      border: 1px solid var(--border, #222); background: none; color: var(--muted, #777);
      cursor: pointer; transition: background .12s, color .12s;
    }
    .sl-embed-tab.active { background: #ef4444; color: #fff; border-color: #ef4444; }
    .sl-embed-frame-wrap { margin-bottom: 8px; }
    .sl-embed-frame-wrap iframe { border-radius: 8px; border: none; width: 100%; display: block; }
    .sl-embed-frame-wrap .sl-video-aspect { position: relative; width: 100%; padding-bottom: 56.25%; }
    .sl-embed-frame-wrap .sl-video-aspect iframe { position: absolute; inset: 0; height: 100%; }
    .sl-excerpt { font-size: .75rem; color: var(--muted, #777); line-height: 1.5; margin: 6px 0 0; }
    .sl-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
    .sl-tag { font-size: .65rem; padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border, #222); color: var(--muted, #666); }
    .sl-credits { margin-top: 8px; }
    .sl-credits-label { font-size: .65rem; font-weight: 700; color: var(--muted, #555); text-transform: uppercase; letter-spacing: .1em; }
    .sl-credit-row { font-size: .72rem; color: var(--muted, #777); }
    .sl-credit-row span { color: rgba(255,255,255,.75); }
    .sl-links { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
    .sl-link { font-size: .72rem; color: #ef4444; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    .sl-link:hover { text-decoration: underline; }
    .sl-link svg { width: 11px; height: 11px; }

    /* Empty / loading */
    .sl-empty {
      text-align: center; padding: 80px 20px; color: var(--muted, #666);
    }
    .sl-empty svg { width: 48px; height: 48px; opacity: .2; margin: 0 auto 12px; display: block; }
    .sl-empty-title { font-size: .9rem; font-weight: 600; margin: 0 0 4px; }
    .sl-empty-sub { font-size: .78rem; }

    .sl-skeleton-grid { display: grid; grid-template-columns: 1fr; gap: 10px; padding: 12px 14px; max-width: 900px; margin: 0 auto; }
    @media (min-width: 600px) { .sl-skeleton-grid { grid-template-columns: 1fr 1fr; } }
    .sl-skeleton-card { height: 86px; border-radius: 12px; background: var(--card, #0d0d0d); animation: sl-pulse 1.4s ease infinite; }
    @keyframes sl-pulse { 0%,100%{opacity:.4} 50%{opacity:.9} }

    /* Category colour map */
    .cat--music       { background: #059669; color: #fff; }
    .cat--radio       { background: #2563eb; color: #fff; }
    .cat--documentary { background: #7c3aed; color: #fff; }
    .cat--mix         { background: #d97706; color: #000; }
    .cat--podcast     { background: #db2777; color: #fff; }
    .cat--field       { background: #0891b2; color: #fff; }
    .cat--other       { background: #475569; color: #fff; }
  </style>

<!-- Rail toggle -->
<script>
(function () {
  var rail = document.getElementById('rail');
  var toggle = document.getElementById('menu-toggle');
  var backdrop = document.getElementById('rail-backdrop');
  function openRail()  { rail.classList.add('expanded'); document.body.classList.add('rail-open'); }
  function closeRail() { rail.classList.remove('expanded'); document.body.classList.remove('rail-open'); }
  toggle  && toggle.addEventListener('click', function () { rail.classList.contains('expanded') ? closeRail() : openRail(); });
  backdrop && backdrop.addEventListener('click', closeRail);
  document.getElementById('bottombar')?.addEventListener('click', function (e) {
    var b = e.target.closest('[data-bbar]'); if (!b) return;
    if (b.dataset.bbar === 'menu') { rail.classList.contains('expanded') ? closeRail() : openRail(); }
  });
})();
</script>
